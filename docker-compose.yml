# Docker Compose for RustMUD
# Complete deployment setup with database and optional services

version: '3.8'

services:
  # RustMUD Game Server
  rustmud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustmud-server
    restart: unless-stopped
    ports:
      - "9999:9999"  # MUD telnet port
      - "8080:8080"  # HTTP API port
    environment:
      - RUST_LOG=info
      - GAME_AREA=tx01
      - PORT=9999
      - IP=0.0.0.0
      # Database configuration
      - DATABASE_URL=mysql://rustmud:password@mysql:3306/rustmud
    volumes:
      # Mount game data directory for persistence
      - rustmud-data:/app/gamenv
      # Mount log directory
      - rustmud-logs:/app/log
      # Optional: Mount txpike9 compatibility data
      - txpike9-data:/usr/local/games/txpike9:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rustmud-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9999"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: rustmud-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=rustmud
      - MYSQL_USER=rustmud
      - MYSQL_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Optional: Init SQL script
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rustmud-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  # Redis (optional - for caching and session management)
  redis:
    image: redis:7-alpine
    container_name: rustmud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rustmud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: rustmud-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - rustmud
    networks:
      - rustmud-network

  # Admin panel monitoring (optional)
  adminer:
    image: adminer:latest
    container_name: rustmud-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - rustmud-network

networks:
  rustmud-network:
    driver: bridge

volumes:
  rustmud-data:
    driver: local
  rustmud-logs:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local
  txpike9-data:
    driver: local
