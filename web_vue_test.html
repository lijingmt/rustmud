<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustMUD - Vue Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; }
        .modal { background: #16213e; padding: 30px; border-radius: 10px; width: 350px; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #00ffff; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 5px; background: #0f3460; color: #fff; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #00ffff; color: #000; width: 100%; }
        .btn-block { width: 100%; }
        .message-error { color: #ff6b6b; margin-top: 10px; font-size: 14px; }
        .connection-status { position: fixed; bottom: 10px; right: 10px; padding: 10px 20px; background: #333; border-radius: 20px; font-size: 12px; }
        .connected { background: #28a745; }
        .disconnected { background: #dc3545; }
    </style>
</head>
<body>
    <div id="app">
        <div class="modal-overlay" v-if="showLogin">
            <div class="modal">
                <h2 style="text-align:center;margin-bottom:20px;">RustMUD 登录</h2>
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" v-model="loginForm.userid" class="form-control" placeholder="输入账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="loginForm.password" class="form-control" placeholder="输入密码">
                </div>
                <button class="btn btn-primary btn-block" @click="doLogin" :disabled="isLoggingIn">
                    {{ isLoggingIn ? '登录中...' : '登录' }}
                </button>
                <div v-if="loginError" class="message-error">{{ loginError }}</div>
                <div style="margin-top:15px;font-size:12px;color:#888;">
                    API地址: http://localhost:8081
                </div>
            </div>
        </div>
        <div v-if="!showLogin">
            <h1 style="padding:20px;">欢迎, {{ state.player?.name }}!</h1>
            <div style="padding:20px;">
                <h3>游戏消息:</h3>
                <div v-for="msg in state.messages" :key="msg.id" style="padding:5px;color:#aaa;">
                    {{ msg.text }}
                </div>
            </div>
            <div style="padding:20px;">
                <input type="text" v-model="inputCommand" @keyup.enter="sendCommand(inputCommand)"
                    style="padding:10px;width:300px;" placeholder="输入命令...">
                <button @click="sendCommand(inputCommand)" style="padding:10px;">发送</button>
            </div>
        </div>
        <div class="connection-status" :class="{connected: !showLogin, disconnected: showLogin}">
            {{ connectionStatus }}
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    showLogin: true,
                    isLoggingIn: false,
                    loginError: '',
                    loginForm: { userid: '', password: '' },
                    txd: '',
                    state: { messages: [], player: null },
                    inputCommand: '',
                    apiBase: 'http://localhost:8081'  // Direct to 8081
                };
            },
            computed: {
                connectionStatus() {
                    return this.showLogin ? '未连接' : '已连接';
                }
            },
            methods: {
                encodeTxd(userid, password) {
                    let uid = '', pid = '';
                    for (let i = 0; i < userid.length; i++) {
                        let code = userid.charCodeAt(i);
                        if (Math.floor(i / 2) === 0) {
                            uid += code === 121 ? '%7B' : String.fromCharCode(code + 2);
                        } else {
                            uid += code === 122 ? '%7B' : String.fromCharCode(code + 1);
                        }
                    }
                    for (let i = 0; i < password.length; i++) {
                        let code = password.charCodeAt(i);
                        if (Math.floor(i / 2) === 0) {
                            pid += code === 122 ? '%7B' : String.fromCharCode(code + 1);
                        } else {
                            if (code === 121) { pid += '%7C'; }
                            else if (code === 122) { pid += '%7C'; }
                            else { pid += String.fromCharCode(code + 2); }
                        }
                    }
                    return uid + '~' + pid;
                },
                async apiRequest(cmd) {
                    try {
                        const params = new URLSearchParams({ txd: this.txd, cmd: cmd });
                        const response = await fetch(this.apiBase + '/api?' + params.toString());
                        if (!response.ok) throw new Error('HTTP ' + response.status);
                        return await response.json();
                    } catch (e) {
                        console.error('API error:', e);
                        return { error: e.message };
                    }
                },
                async doLogin() {
                    if (!this.loginForm.userid || !this.loginForm.password) {
                        this.loginError = '请输入账号和密码';
                        return;
                    }
                    this.isLoggingIn = true;
                    this.loginError = '';
                    try {
                        this.txd = this.encodeTxd(this.loginForm.userid, this.loginForm.password);
                        const result = await this.apiRequest('look');
                        if (result.error) {
                            this.loginError = result.error;
                        } else {
                            this.showLogin = false;
                            this.state.messages = result.messages || [];
                            this.state.player = result.player || { name: this.loginForm.userid };
                        }
                    } catch (e) {
                        this.loginError = '连接失败: ' + e.message;
                    } finally {
                        this.isLoggingIn = false;
                    }
                },
                async sendCommand(cmd) {
                    if (!cmd) return;
                    this.inputCommand = '';
                    const result = await this.apiRequest(cmd);
                    if (result.messages) {
                        this.state.messages.push(...result.messages);
                    }
                }
            },
            mounted() {
                console.log('API地址:', this.apiBase);
            }
        }).mount('#app');
    </script>
</body>
</html>
