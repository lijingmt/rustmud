<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天下AI网游 - Vue版</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body :class="{'dark-mode': theme === 'dark'}">
    <div id="app">
        <!-- 登录弹窗 -->
        <div class="modal-overlay" v-if="showLogin">
            <div class="modal">
                <h2>账号登录</h2>
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" v-model="loginForm.userid" placeholder="输入账号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" v-model="loginForm.password" placeholder="输入密码">
                </div>
                <button class="btn btn-primary btn-block" @click="doLogin">
                    {{ isLoggingIn ? '登录中...' : '登录' }}
                </button>
                <div v-if="loginError" class="message message-error" style="margin-top:15px">
                    {{ loginError }}
                </div>
            </div>
        </div>

        <!-- 顶部状态栏 -->
        <header class="game-header" v-if="!showLogin">
            <div class="player-info">
                <div class="player-info-line">
                    <span class="player-fullid">{{ state.player?.name || '加载中...' }}</span>
                    <span class="divider">·</span>
                    <span class="player-name-cn">玩家</span>
                    <span class="divider">·</span>
                    <span class="server-info">1区</span>
                    <span class="divider">·</span>
                    <span class="autofight-status-text"> 自动战斗: 关</span>
                </div>
                <div class="player-stats">
                    <div class="stat-bar">
                        <span class="stat-label">生命</span>
                        <div class="bar-container">
                            <div class="bar-fill hp-bar" :style="{width: (state.player?.hpPercent || 0) + '%'}"></div>
                        </div>
                    </div>
                    <div class="stat-bar">
                        <span class="stat-label">精神</span>
                        <div class="bar-container">
                            <div class="bar-fill spirit-bar" :style="{width: (state.player?.mpPercent || 0) + '%'}"></div>
                        </div>
                    </div>
                    <div class="stat-bar">
                        <span class="stat-label">潜能</span>
                        <div class="bar-container">
                            <div class="bar-fill potential-bar" style="width: 100%;"></div>
                        </div>
                    </div>
                    <div class="stat-bar">
                        <span class="stat-label">内力</span>
                        <div class="bar-container">
                            <div class="bar-fill neili-bar" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="header-menu-container">
                    <button class="header-btn menu-btn" title="菜单" @click="toggleTheme">
                        {{ theme === 'classic' ? '🏜️' : (theme === 'dark' ? '🌙' : '☀️') }}
                    </button>
                </div>
            </div>
        </header>

        <!-- 主游戏区域 - MUD输出容器 -->
        <main class="game-frame-container" v-if="!showLogin">
            <div class="mud-output-container" :class="{'dark-mode': theme === 'dark'}" :style="{minHeight: mudContainerHeight + 'px'}">
                <div class="mud-parent">
                    <div class="mud-child">
                        <!-- 渲染 MUD 输出行 -->
                        <div class="mud-line" v-for="(line, idx) in parsedMudLinesData" :key="idx">
                            <!-- 空行 -->
                            <br v-if="line.isEmpty">
                            <!-- 文本行 -->
                            <template v-else>
                                <span v-for="(segment, sidx) in line.segments" :key="sidx">
                                    <!-- 按钮片段 - 支持颜色 -->
                                    <a v-if="segment.isButton"
                                       href="#"
                                       :class="['btn', 'btn-sm', 'mud-btn', segment.buttonClass]"
                                       @click.prevent="sendCommand(segment.command)">
                                        <!-- 如果有 parts 数组，渲染带颜色的文本 -->
                                        <template v-if="segment.parts && segment.parts.length > 0">
                                            <span v-for="(part, pidx) in segment.parts" :key="pidx"
                                                  :style="{color: part.color, fontWeight: part.bold ? 'bold' : 'normal'}">
                                                {{ part.text }}
                                            </span>
                                        </template>
                                        <!-- 否则使用纯文本 -->
                                        <template v-else>
                                            {{ segment.text }}
                                        </template>
                                    </a>
                                    <!-- 纯文本片段 - 支持颜色 -->
                                    <span v-else
                                          class="mud-text"
                                          :style="{color: segment.color, fontWeight: segment.bold ? 'bold' : 'normal'}">
                                        {{ segment.text }}
                                    </span>
                                </span>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部快捷操作栏 -->
        <footer class="quick-actions" v-if="!showLogin">
            <button class="quick-toggle-btn" title="折叠菜单" @click="quickActionsCollapsed = !quickActionsCollapsed">
                {{ quickActionsCollapsed ? '▲' : '▼' }}
            </button>
            <div class="quick-actions-inner" v-show="!quickActionsCollapsed">
                <button class="quick-btn" @click="sendCommand('look')">👁️ 查看</button>
                <button class="quick-btn" @click="sendCommand('use 小生命药水')">💊 吃药</button>
                <button class="quick-btn" @click="sendCommand('score')">❤️ 状态</button>
                <button class="quick-btn" @click="sendCommand('inventory')">🎒 背包</button>
                <button class="quick-btn" @click="sendCommand('skills')">⚔️ 武功</button>
                <button class="quick-btn" @click="sendCommand('tasks')">📜 任务</button>
                <button class="quick-btn" @click="sendCommand('shop')">🛒 商城</button>
                <button class="quick-btn" @click="sendCommand('functions')">🎮 功能</button>
                <button class="quick-btn" @click="sendCommand('settings')">⚙️ 设置</button>
                <button class="quick-btn" @click="sendCommand('call horse')">🐎 唤马</button>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="js/app.js?v=20260409-pk-fix"></script>
</body>
</html>
