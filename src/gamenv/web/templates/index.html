<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustMUD - Browser MUD Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #eee;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #00ff00;
        }
        .game-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        .main-panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 5px;
            overflow: hidden;
        }
        .output {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
        }
        .output::-webkit-scrollbar {
            width: 8px;
        }
        .output::-webkit-scrollbar-track {
            background: #0f3460;
        }
        .output::-webkit-scrollbar-thumb {
            background: #533483;
        }
        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #0f3460;
        }
        .input-area input {
            flex: 1;
            background: #0f3460;
            border: 1px solid #533483;
            color: #eee;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .input-area button {
            margin-left: 10px;
            padding: 10px 20px;
            background: #533483;
            border: none;
            color: #eee;
            cursor: pointer;
        }
        .input-area button:hover {
            background: #e94560;
        }
        .side-panel {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 5px;
            padding: 15px;
        }
        .side-panel h3 {
            color: #00ff00;
            margin-bottom: 10px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        .status-item {
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .status-label {
            color: #888;
        }
        .status-value {
            color: #00ff00;
        }
        .connection-status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 3px;
            text-align: center;
        }
        .connected {
            background: #1b4332;
            color: #00ff00;
        }
        .disconnected {
            background: #4a1d1d;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RustMUD</h1>
            <p>A Rust MUD Engine - 1:1 Port of txpike9</p>
        </div>

        <div class="connection-status disconnected" id="connectionStatus">
            Disconnected
        </div>

        <div class="game-container">
            <div class="main-panel">
                <div class="output" id="output">
                    <p>Welcome to RustMUD!</p>
                    <p>Connecting...</p>
                </div>
                <div class="input-area">
                    <input type="text" id="commandInput" placeholder="Enter command..." autofocus>
                    <button onclick="sendCommand()">Send</button>
                </div>
            </div>

            <div class="side-panel">
                <h3>Status</h3>
                <div class="status-item">
                    <span class="status-label">HP:</span>
                    <span class="status-value" id="hp">100/100</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Qi:</span>
                    <span class="status-value" id="qi">50/50</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Exp:</span>
                    <span class="status-value" id="exp">0</span>
                </div>

                <h3 style="margin-top: 20px;">Quick Commands</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button onclick="quickCmd('look')" style="padding: 5px; cursor: pointer;">Look</button>
                    <button onclick="quickCmd('inventory')" style="padding: 5px; cursor: pointer;">Inventory</button>
                    <button onclick="quickCmd('skills')" style="padding: 5px; cursor: pointer;">Skills</button>
                    <button onclick="quickCmd('help')" style="padding: 5px; cursor: pointer;">Help</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + window.location.host + '/ws');
        const output = document.getElementById('output');
        const input = document.getElementById('commandInput');
        const status = document.getElementById('connectionStatus');

        ws.onopen = function() {
            status.textContent = 'Connected';
            status.className = 'connection-status connected';
            addOutput('Connected to RustMUD server!', '#00ff00');
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.output) {
                addOutput(data.output);
            }
        };

        ws.onclose = function() {
            status.textContent = 'Disconnected';
            status.className = 'connection-status disconnected';
            addOutput('Disconnected from server.', '#ff6b6b');
        };

        ws.onerror = function(error) {
            addOutput('Connection error: ' + error, '#ff6b6b');
        };

        function sendCommand() {
            const cmd = input.value.trim();
            if (!cmd) return;

            ws.send(JSON.stringify({
                action: 'command',
                command: cmd
            }));

            input.value = '';
        }

        function quickCmd(cmd) {
            input.value = cmd;
            sendCommand();
        }

        function addOutput(text, color) {
            const line = document.createElement('p');
            line.style.color = color || '#eee';
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendCommand();
            }
        });
    </script>
</body>
</html>
